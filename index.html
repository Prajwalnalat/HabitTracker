<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prajwal's Habit Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #0d0f14;
            --surface: #141720;
            --s2: #1c2030;
            --border: #252a3a;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --accent3: #43e97b;
            --gold: #f7c948;
            --text: #e8eaf6;
            --muted: #6b7280;
            --done: #43e97b
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -.5px
        }

        .logo span {
            color: var(--text)
        }

        .header-date {
            font-size: 13px;
            color: var(--muted);
            font-family: 'Space Mono', monospace
        }

        .nav-tabs {
            display: flex;
            gap: 4px
        }

        .nav-tab {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: all .2s
        }

        .nav-tab.active {
            background: var(--accent);
            color: #fff
        }

        .nav-tab:hover:not(.active) {
            background: var(--border);
            color: var(--text)
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px
        }

        .view {
            display: none
        }

        .view.active {
            display: block
        }

        .today-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 28px
        }

        .today-title h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1
        }

        .today-title p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px
        }

        .ring-wrap {
            position: relative;
            width: 80px;
            height: 80px
        }

        .ring-wrap svg {
            transform: rotate(-90deg)
        }

        .ring-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700
        }

        .ring-label small {
            font-size: 9px;
            color: var(--muted)
        }

        .habits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        @media(max-width:600px) {
            .habits-grid {
                grid-template-columns: 1fr
            }
        }

        .habit-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            overflow: hidden
        }

        .habit-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 3px 0 0 3px;
            opacity: 0;
            transition: opacity .2s
        }

        .habit-card.done {
            border-color: var(--done);
            background: rgba(67, 233, 123, .06)
        }

        .habit-card.done::before {
            opacity: 1;
            background: var(--done)
        }

        .habit-card:hover {
            border-color: var(--accent);
            transform: translateY(-1px)
        }

        .habit-check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: all .2s
        }

        .habit-card.done .habit-check {
            background: var(--done);
            border-color: var(--done);
            color: #0d0f14
        }

        .habit-info {
            flex: 1;
            min-width: 0
        }

        .habit-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .habit-streak {
            font-size: 11px;
            color: var(--gold);
            margin-top: 2px
        }

        .habit-emoji {
            font-size: 22px;
            flex-shrink: 0
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            margin-top: 32px
        }

        .section-head h2 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted)
        }

        .section-head .line {
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px
        }

        @media(max-width:500px) {
            .stats-row {
                grid-template-columns: 1fr 1fr
            }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700
        }

        .stat-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        .habits-progress-list {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .hprog-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px
        }

        .hprog-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px
        }

        .hprog-name {
            font-size: 14px;
            font-weight: 500
        }

        .hprog-pct {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700
        }

        .bar-track {
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .8s cubic-bezier(.4, 0, .2, 1)
        }

        .cal-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px
        }

        .cal-nav h2 {
            font-size: 20px;
            font-weight: 700;
            flex: 1;
            text-align: center
        }

        .cal-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .cal-btn:hover {
            background: var(--border)
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px
        }

        .cal-day-label {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            padding-bottom: 4px;
            letter-spacing: 1px
        }

        .cal-day {
            aspect-ratio: 1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all .15s
        }

        .cal-day.empty {
            cursor: default
        }

        .cal-day.has-data {
            border-color: var(--border);
            background: var(--surface)
        }

        .cal-day.today {
            border-color: var(--accent)
        }

        .cal-day:not(.empty):hover {
            border-color: var(--accent);
            transform: scale(1.05)
        }

        .cal-day.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .cal-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-top: 3px
        }

        .dot-good {
            background: var(--done)
        }

        .dot-mid {
            background: var(--gold)
        }

        .dot-low {
            background: var(--accent2)
        }

        .manage-habits {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px
        }

        .manage-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .manage-emoji {
            font-size: 20px
        }

        .manage-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500
        }

        .del-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent2);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer
        }

        .del-btn:hover {
            background: rgba(255, 101, 132, .1)
        }

        .add-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap
        }

        .add-form input,
        .add-form select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none
        }

        .add-form input {
            flex: 1;
            min-width: 180px
        }

        .add-form input:focus,
        .add-form select:focus {
            border-color: var(--accent)
        }

        .add-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            border-radius: 8px;
            padding: 10px 22px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer
        }

        .add-btn:hover {
            opacity: .85
        }

        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--done);
            color: #0d0f14;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 22px;
            border-radius: 99px;
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            z-index: 999;
            pointer-events: none
        }

        .toast.show {
            transform: translateX(-50%) translateY(0)
        }

        footer#prajwal-copyright {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            margin-top: 40px;
            position: relative;
            z-index: 10
        }

        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px
        }

        .footer-logo {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent)
        }

        .footer-copy {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            flex: 1
        }

        .footer-copy strong {
            color: var(--text)
        }

        .footer-lock {
            font-size: 11px;
            color: var(--done);
            font-family: 'Space Mono', monospace
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Prajwal<span>.habits</span></div>
        <div class="nav-tabs">
            <button class="nav-tab" id="btnLogout" style="display: none; color: var(--accent2);">Logout</button>
            <button class="nav-tab active" onclick="switchView('today',this)">Today</button><button
                class="nav-tab" onclick="switchView('progress',this)">Progress</button><button class="nav-tab"
                onclick="switchView('calendar',this)">Calendar</button><button class="nav-tab"
                onclick="switchView('manage',this)">Manage</button></div>
        <div class="header-date" id="headerDate"></div>
    </header>
    <main>
        <div class="view" id="view-login">
    <div class="today-header" style="justify-content: center; text-align: center; margin-top: 40px;">
        <div class="today-title">
            <h1>Welcome Back 👋</h1>
            <p>Sign in to sync your habits across devices.</p>
        </div>
    </div>
    
    <div class="add-form" style="flex-direction: column; max-width: 380px; margin: 0 auto; gap: 16px;">
        <input type="email" id="authEmail" placeholder="Email address" style="width: 100%;" />
        <input type="password" id="authPassword" placeholder="Password" style="width: 100%;" />
        
        <div style="display: flex; gap: 12px; margin-top: 8px; width: 100%;">
            <button class="add-btn" id="btnSignIn" style="flex: 1;">Sign In</button>
            <button class="add-btn" id="btnSignUp" disabled style="flex: 1; background: var(--surface); border: 1px solid var(--accent); color: var(--text); opacity: 0.5; cursor: not-allowed;">Sign Up</button>
        </div>
        <p id="authError" style="color: var(--accent2); font-size: 13px; text-align: center; display: none; margin: 0;"></p>
    </div>
</div>
        <div class="view active" id="view-today">
            <div class="today-header">
                <div class="today-title">
                    <h1 id="greeting">Good morning 👋</h1>
                    <p id="todaySubtitle">Add your first habit to get started!</p>
                </div>
                <div class="ring-wrap"><svg width="80" height="80" viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="34" fill="none" stroke="#252a3a" stroke-width="7" />
                        <circle cx="40" cy="40" r="34" fill="none" stroke="url(#ringGrad)" stroke-width="7"
                            stroke-linecap="round" stroke-dasharray="213.6" id="ringProgress"
                            stroke-dashoffset="213.6" />
                        <defs>
                            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#6c63ff" />
                                <stop offset="100%" stop-color="#43e97b" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="ring-label"><span id="ringPct">0%</span><small>done</small></div>
                </div>
            </div>
            <div class="section-head">
                <div class="line"></div>
                <h2>Daily Habits</h2>
                <div class="line"></div>
            </div>
            <div class="habits-grid" id="habitsGrid"></div>
        </div>
        <div class="view" id="view-progress">
            <div class="section-head" style="margin-top:0">
                <div class="line"></div>
                <h2>This Month</h2>
                <div class="line"></div>
            </div>
            <div class="stats-row" id="statsRow"></div>
            <div class="section-head">
                <div class="line"></div>
                <h2>Habit Breakdown</h2>
                <div class="line"></div>
            </div>
            <div class="habits-progress-list" id="habitsProgressList"></div>
        </div>
        <div class="view" id="view-calendar">
            <div class="cal-nav"><button class="cal-btn" onclick="calNav(-1)">‹</button>
                <h2 id="calMonthLabel"></h2><button class="cal-btn" onclick="calNav(1)">›</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div id="calDayDetail"></div>
        </div>
        <div class="view" id="view-manage">
            <div class="section-head" style="margin-top:0">
                <div class="line"></div>
                <h2>Your Habits</h2>
                <div class="line"></div>
            </div>
            <div class="manage-habits" id="manageList"></div>
            <div class="section-head">
                <div class="line"></div>
                <h2>Add New Habit</h2>
                <div class="line"></div>
            </div>
            <div class="add-form"><select id="newEmoji">
                    <option>📖</option>
                    <option>🕌</option>
                    <option>📚</option>
                    <option>🧹</option>
                    <option>📈</option>
                    <option>🧘</option>
                    <option>🏋️</option>
                    <option>😴</option>
                    <option>😤</option>
                    <option>💼</option>
                    <option>💊</option>
                    <option>💇</option>
                    <option>🚶</option>
                    <option>💧</option>
                    <option>✍️</option>
                    <option>🎯</option>
                </select><input type="text" id="newHabitName" placeholder="New habit name..." maxlength="40"
                    onkeydown="if(event.key==='Enter')addHabit()" /><button class="add-btn" onclick="addHabit()">Add
                    Habit</button></div>
        </div>
    </main>
    <div class="toast" id="toast"></div>
    <footer id="prajwal-copyright" data-protected="true">
        <div class="footer-inner"><span class="footer-logo">🎯 Habit Tracker</span><span class="footer-copy">© 2025
                Created by <strong>Prajwal Nalat</strong>. All rights reserved.</span><span class="footer-lock">🔒
                Protected</span></div>

<script type="module">
    // Import Firebase Auth & App
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    
    // Import Firestore Database
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // TODO: Replace with your actual Firebase project config
    const firebaseConfig = {
        apiKey: "AIzaSyB0ou_5LPo3HHmbs9snTHVkOBSzAjMT8XY",
        authDomain: "habittracker-9372c.firebaseapp.com",
        projectId: "habittracker-9372c",
        storageBucket: "habittracker-9372c.firebasestorage.app",
        messagingSenderId: "663137526777",
        appId: "1:663137526777:web:f7784bd3f15cc222291328"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const dbCloud = getFirestore(app);

    // DOM Elements
    const emailInput = document.getElementById('authEmail');
    const passwordInput = document.getElementById('authPassword');
    const signInBtn = document.getElementById('btnSignIn');
    const signUpBtn = document.getElementById('btnSignUp');
    const logoutBtn = document.getElementById('btnLogout');
    const errorText = document.getElementById('authError');
    const loginView = document.getElementById('view-login');

    let currentUser = null;

    // --- 🪄 MAGIC STEP 1: Intercept Local Saves to send to Cloud ---
    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
        // Still save locally for instant UI updates
        originalSetItem.apply(this, arguments); 
        
        // If it's your habit data AND a user is logged in, push to Firestore
        if (key === 'habit_tracker_app' && currentUser) {
            try {
                const data = JSON.parse(value);
                setDoc(doc(dbCloud, "users", currentUser.uid), data).catch(console.error);
            } catch (e) {
                console.error("Failed to parse local data for cloud backup");
            }
        }
    };

    // --- 🪄 MAGIC STEP 2: Fetch Cloud Data and Inject into App ---
    async function syncFromCloud(uid) {
        try {
            const docRef = doc(dbCloud, "users", uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                
                // Write directly to local storage to persist locally
                originalSetItem.call(localStorage, 'habit_tracker_app', JSON.stringify(cloudData));
                
                // Mutate the app's in-memory data structures directly
                if (window.habits && window.log) {
                    const localHabits = window.habits();
                    const localLog = window.log();
                    
                    // Clear and swap habits
                    localHabits.length = 0; 
                    if (cloudData.habits) localHabits.push(...cloudData.habits);
                    
                    // Clear and swap logs
                    Object.keys(localLog).forEach(key => delete localLog[key]);
                    if (cloudData.log) Object.assign(localLog, cloudData.log);
                }
            } else {
                // First login ever: upload whatever offline habits they already created
                if (window.habits && window.log) {
                   await setDoc(docRef, {
                       habits: window.habits(),
                       log: window.log()
                   });
                }
            }
            
            // Force the UI to repaint with the new cloud data
            if (window.renderToday) window.renderToday();
            if (window.renderProgress) window.renderProgress();
        } catch (error) {
            console.error("Error syncing with cloud:", error);
        }
    }

    // Helper: Show Auth Errors
    const showError = (msg) => {
        errorText.textContent = msg.replace('Firebase:', '').trim();
        errorText.style.display = 'block';
    };

    // Listen for Authentication State Changes
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            loginView.classList.remove('active');
            logoutBtn.style.display = 'block';
            
            // Sync data before showing the app
            await syncFromCloud(user.uid);
            
            if (window.switchView) {
                const todayTab = document.querySelector('.nav-tab');
                window.switchView('today', todayTab);
                if (window.showToast) window.showToast("Logged in & synced!");
            }
        } else {
            currentUser = null;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            loginView.classList.add('active');
            logoutBtn.style.display = 'none';
        }
    });

    // Handle Sign Up
    signUpBtn.addEventListener('click', async () => {
        errorText.style.display = 'none';
        try {
            await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        } catch (error) {
            showError(error.message);
        }
    });

    // Handle Sign In
    signInBtn.addEventListener('click', async () => {
        errorText.style.display = 'none';
        try {
            await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
        } catch (error) {
            showError(error.message);
        }
    });

    // Handle Logout
    logoutBtn.addEventListener('click', () => {
        signOut(auth);
        emailInput.value = '';
        passwordInput.value = '';
        
        // Clear local memory so the next person logging in doesn't see previous data
        if (window.habits) window.habits().length = 0;
        if (window.log) {
            const localLog = window.log();
            Object.keys(localLog).forEach(k => delete localLog[k]);
        }
    });
</script>
</body>

</html>
